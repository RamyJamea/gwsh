<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantOS — Point of Sale</title>
  <meta name="description" content="Multi-branch restaurant management and POS system">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-icon">⬡</div>
        <h1>RestaurantOS</h1>
        <p class="login-subtitle">Point of Sale System</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter username" autofocus required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="Enter password" required>
            <button type="button" class="password-toggle" id="password-toggle">👁</button>
          </div>
        </div>
        <div id="login-error" class="error-message hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <a href="#" class="forgot-link">Reset password</a>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="hidden">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon-sm">⬡</div>
        <span class="sidebar-title">Mr. Goush</span>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="sidebar-user" class="sidebar-user"></div>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Sign Out</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-area">
      <!-- TOP BAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-toggle" class="btn btn-ghost btn-icon">☰</button>
          <div id="branch-selector" class="branch-selector hidden">
            <select id="branch-select"></select>
          </div>
        </div>
        <div class="topbar-center">
          <div class="search-wrapper">
            <input type="text" id="global-search" class="search-input" placeholder="Search…">
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-icon notif-btn" id="notif-btn">🔔<span class="notif-badge hidden" id="notif-badge">0</span></button>
          <div class="user-pill" id="topbar-user"></div>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <div id="content" class="content"></div>
    </main>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container"></div>
  </div>

  <!-- DRAWER -->
  <div id="drawer-overlay" class="drawer-overlay hidden">
    <div id="drawer" class="drawer">
      <div class="drawer-header">
        <h3 id="drawer-title"></h3>
        <button class="btn btn-ghost btn-icon" id="drawer-close">✕</button>
      </div>
      <div id="drawer-content" class="drawer-content"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
