<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Abu Goush — Premium POS</title>
  <meta name="description" content="Multi-branch restaurant management and POS system">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen active">
    <div class="login-split">
      <div class="login-banner">
        <div class="banner-content">
          <div class="huge-icon">⬡</div>
          <h1>Abu Goush</h1>
          <p>Next-Generation Integrated POS System</p>
        </div>
      </div>
      <div class="login-form-container">
        <form id="login-form" autocomplete="off" class="glass-panel">
          <h2>Welcome Back</h2>
          <p class="login-subtitle">Sign in to your counter</p>
          <div class="form-group empty-label">
            <input type="text" id="login-username" placeholder="Employee ID or Username" autofocus required>
          </div>
          <div class="form-group empty-label">
            <div class="password-wrapper">
              <input type="password" id="login-password" placeholder="Password" required>
              <button type="button" class="btn-icon password-toggle" id="password-toggle">👁</button>
            </div>
          </div>
          <div id="login-error" class="error-message hidden"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="hidden">
    <!-- SLIM SIDEBAR -->
    <aside id="sidebar" class="sidebar-slim">
      <div class="sidebar-brand">⬡</div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-avatar-small" id="sidebar-user" title="Profile"></div>
        <button id="logout-btn" class="btn-icon btn-danger logout-icon" title="Sign Out">⏑</button>
      </div>
    </aside>

    <!-- MAIN APP AREA -->
    <main class="main-area">
      <!-- TOP BAR -->
      <header class="topbar glass-bar" id="main-topbar">
        <div class="topbar-left" style="display:flex; align-items:center; gap:12px;">
          <div id="branch-selector" class="branch-selector hidden">
            <select id="branch-select" class="glass-select"></select>
          </div>
          <button id="view-detailed-menu-btn" class="btn btn-sm btn-outline hidden" style="border-radius:20px; align-self:center;">
             <span style="font-size:1.1rem; margin-right:4px;">📜</span> Detailed Menu
          </button>
        </div>
        <div class="topbar-right">
          <div class="user-pill" id="topbar-user"></div>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <div id="content" class="content"></div>
    </main>
  </div>

  <!-- MODAL AND TOASTS -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container glass-modal"></div>
  </div>
  <div id="drawer-overlay" class="drawer-overlay hidden">
    <div id="drawer" class="drawer glass-drawer">
      <div class="drawer-header">
        <h3 id="drawer-title"></h3>
        <button class="btn btn-ghost btn-icon" id="drawer-close">✕</button>
      </div>
      <div id="drawer-content" class="drawer-content"></div>
    </div>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <!-- SCRIPTS -->
  <script src="js/core/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/pos.js"></script>
  <script src="js/views/orders.js"></script>
  <script src="js/views/tables.js"></script>
  <script src="js/views/history.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/views/management.js"></script>
  <script src="js/components/modals.js"></script>

</body>

</html>
